<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Question - ExamPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a1a2e; --accent: #e94560; --surface: #16213e; --text: #eaeaea; --text-muted: #8b8b9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #0f0f1a; color: var(--text); min-height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); min-height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header { padding: 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); }
        .logo span { color: var(--accent); }
        .nav-menu { padding: 20px 12px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; color: var(--text-muted); text-decoration: none; border-radius: 10px; margin-bottom: 4px; transition: all 0.3s ease; font-size: 14px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: rgba(233,69,96,0.1); color: var(--accent); }
        .main-content { margin-left: 260px; padding: 32px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .page-title { font-size: 28px; font-weight: 600; }
        .btn { padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; display: inline-block; border: none; cursor: pointer; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); }
        .btn-primary { background: var(--accent); color: white; }
        .card { background: var(--surface); border-radius: 16px; padding: 32px; border: 1px solid rgba(255,255,255,0.05); max-width: 700px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--text); font-size: 14px; font-family: inherit; transition: all 0.3s ease; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.06); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><div class="logo">Exam<span>Portal</span></div></div>
        <nav class="nav-menu">
            <a href="{% url 'admin_dashboard' %}" class="nav-item"><i class="bi bi-grid-1x2"></i> Dashboard</a>
            <a href="{% url 'manage_questions' %}" class="nav-item active"><i class="bi bi-question-circle"></i> Questions</a>
            <a href="{% url 'manage_exams' %}" class="nav-item"><i class="bi bi-file-earmark-text"></i> Exams</a>
            <a href="{% url 'manage_students' %}" class="nav-item"><i class="bi bi-people"></i> Students</a>
            <a href="{% url 'view_results' %}" class="nav-item"><i class="bi bi-bar-chart"></i> Results</a>
            <a href="{% url 'logout' %}" class="nav-item"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </nav>
    </div>
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Edit Question</h1>
            <a href="{% url 'manage_questions' %}" class="btn btn-secondary">Back</a>
        </div>
        <div class="card">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Question Text</label>
                    <textarea name="question_text" rows="3" required>{{ question.question_text }}</textarea>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Option 1</label><input type="text" name="option1" value="{{ question.option1 }}" required></div>
                    <div class="form-group"><label>Option 2</label><input type="text" name="option2" value="{{ question.option2 }}" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Option 3</label><input type="text" name="option3" value="{{ question.option3 }}" required></div>
                    <div class="form-group"><label>Option 4</label><input type="text" name="option4" value="{{ question.option4 }}" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Correct Answer</label><input type="text" name="correct_answer" value="{{ question.correct_answer }}" required></div>
                    <div class="form-group"><label>Category</label><select name="category"><option value="">No Category</option>{% for cat in categories %}<option value="{{ cat.id }}" {% if question.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}</select></div>
                </div>
                <div class="form-group"><label>Marks</label><input type="number" name="marks" value="{{ question.marks }}" min="1" required></div>
                <button type="submit" class="btn btn-primary">Update Question</button>
            </form>
        </div>
    </div>
</body>
</html>
