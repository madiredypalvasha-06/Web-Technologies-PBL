<!DOCTYPE htm<!DOCTYPE html>
<html>
<head>
    <title>Online Exam</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-3">Online Examination</h2>

        <h5 class="text-danger text-center mb-4">
            Time Remaining: <span id="timer">120</span> seconds
        </h5>

        <form method="post">
            {% csrf_token %}

            {% for question in questions %}
                <div class="mb-4">
                    <p><strong>{{ forloop.counter }}. {{ question.question_text }}</strong></p>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="{{ question.id }}" value="{{ question.option1 }}">
                        <label class="form-check-label">{{ question.option1 }}</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="{{ question.id }}" value="{{ question.option2 }}">
                        <label class="form-check-label">{{ question.option2 }}</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="{{ question.id }}" value="{{ question.option3 }}">
                        <label class="form-check-label">{{ question.option3 }}</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="{{ question.id }}" value="{{ question.option4 }}">
                        <label class="form-check-label">{{ question.option4 }}</label>
                    </div>
                </div>

                <hr>
            {% endfor %}

            <button type="submit" class="btn btn-primary w-100">Submit Exam</button>
        </form>

    </div>
</div>

<script>
    let timeLeft = 120;  
    const timerElement = document.getElementById("timer");

    const countdown = setInterval(function() {
        timeLeft--;
        timerElement.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            alert("Time is up! Submitting your exam.");
            document.querySelector("form").submit();
        }
    }, 1000);
</script>

</body>
</html>
